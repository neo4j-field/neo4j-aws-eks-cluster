# Kubernetes TLS secret — wildcard certificate for your domain
#
# Fill in your TLS private key and certificate below, then apply:
#   kubectl apply -f neo4j-tls-secret.yaml -n neo4j
#
# Tip: Generate with Let's Encrypt (certbot) or your preferred CA.
# The cert should cover the domain/subdomain you point at the NLB.
#
# Alternative — create directly from files:
#   kubectl create secret generic neo4j-tls \
#     --from-file=private.key=./private.key \
#     --from-file=public.crt=./public.crt \
#     -n neo4j

apiVersion: v1
kind: Secret
metadata:
  name: neo4j-tls
  namespace: neo4j
type: Opaque
stringData:
  private.key: |
    -----BEGIN PRIVATE KEY-----
    <YOUR_TLS_PRIVATE_KEY>
    -----END PRIVATE KEY-----
  public.crt: |
    -----BEGIN CERTIFICATE-----
    <YOUR_TLS_CERTIFICATE>
    -----END CERTIFICATE-----
